<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL - BTC AUTHENTICATION</title>
    <style>
        /* --- Alapbeállítások & Futurisztikus betűtípus --- */
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500;700&display=swap');

        :root {
            --bg-color: #0a0a0a;
            --neon-green: #00ff41; /* Hacker zöld */
            --neon-red: #ff3131;   /* Hiba piros */
            --glow-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
            --font-main: 'Fira Code', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--neon-green);
            font-family: var(--font-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* --- Háttér effektek: Rács és Scanline --- */
        body::before {
            content: " ";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
            z-index: 10;
            pointer-events: none;
        }

        /* Mozgó rács effekt */
        .grid-bg {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image: linear-gradient(var(--neon-green) 1px, transparent 1px),
                              linear-gradient(90deg, var(--neon-green) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.05;
            transform: perspective(500px) rotateX(60deg);
            animation: grid-move 20s linear infinite;
            z-index: 1;
        }

        @keyframes grid-move {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        /* --- Központi Panel --- */
        .auth-container {
            position: relative;
            z-index: 20;
            width: 90%;
            max-width: 500px;
            padding: 40px;
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid var(--neon-green);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            text-align: center;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        .auth-container.error {
            border-color: var(--neon-red);
            box-shadow: 0 0 20px rgba(255, 49, 49, 0.4);
            animation: shake 0.4s ease-in-out;
        }

        /* Glitch animáció fejléchez */
        h1 {
            font-size: 1.5rem;
            letter-spacing: 4px;
            margin-bottom: 30px;
            text-transform: uppercase;
            position: relative;
        }

        /* --- Input Mező és Gomb --- */
        .input-group {
            position: relative;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--neon-green);
            padding: 10px;
            color: white;
            font-family: var(--font-main);
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            transition: all 0.3s;
            letter-spacing: 2px;
        }

        input:focus {
            border-bottom: 2px solid var(--neon-green);
            box-shadow: 0 5px 15px -5px var(--neon-green);
        }

        input::placeholder {
            color: rgba(0, 255, 65, 0.3);
            font-size: 0.9rem;
        }

        button {
            background: transparent;
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
            padding: 12px 30px;
            font-family: var(--font-main);
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 2px;
        }

        button:hover {
            background: var(--neon-green);
            color: black;
            box-shadow: 0 0 20px var(--neon-green);
        }

        /* --- Hacker Log és Progress Bar --- */
        #log-area {
            margin-top: 25px;
            font-size: 0.8rem;
            text-align: left;
            height: 100px;
            overflow: hidden;
            display: none;
        }

        .log-entry {
            margin-bottom: 4px;
            opacity: 0;
            animation: fade-in 0.2s forwards;
        }

        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(0, 255, 65, 0.1);
            margin-top: 15px;
            display: none;
            position: relative;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: var(--neon-green);
            box-shadow: 0 0 10px var(--neon-green);
            transition: width 0.1s linear;
        }

        /* --- Végeredmény --- */
        #result-area {
            margin-top: 20px;
            display: none;
        }

        .success-text {
            color: var(--neon-green);
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
        }

        #ip-address {
            font-size: 1.3rem;
            color: white;
            text-shadow: 0 0 10px white;
        }

        /* --- Animációk --- */
        @keyframes fade-in {
            to { opacity: 1; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }

        /* Glitch effekt (piros villogás) */
        .glitch-flash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 49, 49, 0.1);
            z-index: 100;
            pointer-events: none;
            display: none;
        }

        /* Pulzálás a sikeres hitelesítésnél */
        .pulse {
            animation: pulse-green 2s infinite;
        }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 20px rgba(0, 255, 65, 0.2); }
            50% { box-shadow: 0 0 40px rgba(0, 255, 65, 0.5); }
            100% { box-shadow: 0 0 20px rgba(0, 255, 65, 0.2); }
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>
    <div class="glitch-flash" id="glitch-screen"></div>

    <div class="auth-container" id="card">
        <h1 id="title">System Auth</h1>
        
        <div id="ui-main">
            <div class="input-group">
                <input type="text" id="auth-code" placeholder="HHNNÉVXXXXXBTC" spellcheck="false">
            </div>
            <button onclick="handleAuth()" id="auth-btn">Hitelesítés</button>
        </div>

        <div id="log-area"></div>
        <div class="progress-container" id="p-container">
            <div class="progress-bar" id="p-bar"></div>
        </div>

        <div id="result-area">
            <span class="success-text">AUTHENTICATION SUCCESSFUL</span>
            <div id="ip-address"></div>
        </div>
    </div>

    <script>
        const VALID_CODE = "04242600025BTC";
        const SUCCESS_IP = "185.203.119.42";
        
        const logs = [
            "Initializing blockchain verification...",
            "Connecting to decentralized node #742...",
            "Requesting ledger access key...",
            "Decrypting transaction packet...",
            "Running SHA-256 integrity check...",
            "Bypassing secondary firewall...",
            "Hash matched. Verifying ownership...",
            "Access granted to secure server."
        ];

        function handleAuth() {
            const inputField = document.getElementById('auth-code');
            const code = inputField.value.trim();
            const card = document.getElementById('card');
            const glitch = document.getElementById('glitch-screen');

            if (code === VALID_CODE) {
                startSuccessSequence();
            } else {
                startErrorSequence(card, glitch, inputField);
            }
        }

        function startSuccessSequence() {
            const uiMain = document.getElementById('ui-main');
            const logArea = document.getElementById('log-area');
            const pContainer = document.getElementById('p-container');
            const pBar = document.getElementById('p-bar');
            const card = document.getElementById('card');

            // UI átalakítása
            uiMain.style.display = 'none';
            logArea.style.display = 'block';
            pContainer.style.display = 'block';
            card.classList.add('pulse');

            let currentLog = 0;
            let progress = 0;

            // Log szövegek adagolása
            const logInterval = setInterval(() => {
                if (currentLog < logs.length) {
                    const entry = document.createElement('div');
                    entry.className = 'log-entry';
                    entry.innerHTML = `> ${logs[currentLog]}`;
                    logArea.appendChild(entry);
                    logArea.scrollTop = logArea.scrollHeight;
                    currentLog++;
                }
            }, 300);

            // Progress bar töltése
            const progressInterval = setInterval(() => {
                progress += 1;
                pBar.style.width = progress + "%";

                if (progress >= 100) {
                    clearInterval(progressInterval);
                    clearInterval(logInterval);
                    showResult();
                }
            }, 30);
        }

        function showResult() {
            document.getElementById('log-area').style.display = 'none';
            document.getElementById('p-container').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';
            
            const ipDisplay = document.getElementById('ip-address');
            typeWriter(SUCCESS_IP, ipDisplay);
        }

        function typeWriter(text, element) {
            let i = 0;
            element.innerHTML = "";
            const interval = setInterval(() => {
                element.innerHTML += text.charAt(i);
                i++;
                if (i >= text.length) clearInterval(interval);
            }, 100);
        }

        function startErrorSequence(card, glitch, input) {
            // Hiba állapot beállítása
            card.classList.add('error');
            glitch.style.display = 'block';
            
            const originalPlaceholder = input.placeholder;
            const originalValue = input.value;
            
            input.value = "";
            input.placeholder = "HELYTELEN KÓD";
            input.style.color = "var(--neon-red)";

            // Rövid idő után visszaállítás
            setTimeout(() => {
                card.classList.remove('error');
                glitch.style.display = 'none';
                input.placeholder = originalPlaceholder;
                input.value = originalValue;
                input.style.color = "white";
            }, 1000);
        }
    </script>
</body>
</html>
